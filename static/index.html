<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>grill-plan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  :root {
    --amber: #d97706; --amber-bg: #fef3c7; --amber-bg-strong: #fde68a;
    --ink: #1f2937; --muted: #6b7280; --line: #e5e7eb;
    --lily: #2563eb; --lily-bg: #eff6ff;
    --panel-w: 380px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: #fafaf9; }
  header {
    position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .badge { font-size: 12px; color: var(--muted); white-space: nowrap; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
  header .dot.live { background: #16a34a; }
  .hdr-btn {
    font-size: 12px; padding: 4px 12px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: #fff; color: var(--ink); white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--ink); }
  .hdr-btn.primary { background: var(--lily); border-color: var(--lily); color: #fff; }
  #editor {
    width: 100%; min-height: calc(100vh - 160px); font: 13.5px/1.6 ui-monospace, Menlo, monospace;
    border: none; outline: none; resize: vertical; padding: 0; background: #fff; color: var(--ink);
  }
  #grill-nav { display: flex; gap: 6px; overflow-x: auto; padding: 2px; }
  .chip {
    display: flex; align-items: center; justify-content: center; min-width: 26px; height: 26px;
    padding: 0 7px; border-radius: 13px; font-size: 12px; font-weight: 700; cursor: pointer;
    border: 1.5px solid var(--amber); color: var(--amber); background: #fff; white-space: nowrap;
  }
  .chip:hover { background: var(--amber-bg); }
  .chip.answered { background: var(--lily-bg); border-color: var(--lily); color: var(--lily); }
  .chip.resolved { border-color: #d1d5db; color: #9ca3af; background: #f9fafb; text-decoration: line-through; }
  #layout { display: flex; }
  #doc-wrap { flex: 1; min-width: 0; padding: 32px 48px 120px; }
  #doc { max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 48px 56px; line-height: 1.65; font-size: 15px; }
  #doc h1 { font-size: 26px; } #doc h2 { font-size: 21px; margin-top: 2em; } #doc h3 { font-size: 17px; margin-top: 1.6em; }
  #doc img { max-width: 100%; }
  #doc pre { background: #f6f6f4; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
  #doc code { background: #f3f4f6; padding: 1px 4px; border-radius: 4px; font-size: 13px; }
  #doc pre code { background: none; padding: 0; }
  #doc blockquote { border-left: 3px solid var(--line); margin-left: 0; padding-left: 14px; color: var(--muted); }
  #doc table { border-collapse: collapse; } #doc th, #doc td { border: 1px solid var(--line); padding: 5px 9px; font-size: 13.5px; }
  mark.grill-mark { background: var(--amber-bg); border-bottom: 2px solid var(--amber); padding: 1px 0; cursor: pointer; transition: background .2s; }
  mark.grill-mark.active, mark.grill-mark:hover { background: var(--amber-bg-strong); }
  mark.grill-mark.resolved { background: #f3f4f6; border-bottom-color: #d1d5db; }

  #panel { width: var(--panel-w); flex-shrink: 0; position: relative; }
  #toc {
    position: sticky; top: 45px; align-self: flex-start; width: 230px; flex-shrink: 0;
    max-height: calc(100vh - 45px); overflow-y: auto; padding: 24px 8px 40px 16px;
    font-size: 12.5px; line-height: 1.4;
  }
  #toc a { display: block; color: var(--muted); text-decoration: none; padding: 3px 8px; border-radius: 6px; border-left: 2px solid transparent; }
  #toc a:hover { color: var(--ink); background: #f3f4f6; }
  #toc a.active { color: var(--amber); border-left-color: var(--amber); font-weight: 600; }
  #toc a.toc-h1 { font-weight: 700; color: var(--ink); margin-top: 6px; }
  #toc a.toc-h2 { padding-left: 8px; }
  #toc a.toc-h3 { padding-left: 20px; font-size: 12px; }
  #toc a.toc-h4 { padding-left: 32px; font-size: 11.5px; }
  #doc .mermaid { display: flex; justify-content: center; margin: 16px 0; }
  #doc .mermaid svg { max-width: 100%; height: auto; }
  .thread {
    position: absolute; left: 12px; width: calc(100% - 24px);
    border: 1px solid var(--line); border-radius: 10px; background: #fff;
    transition: box-shadow .2s, border-color .2s, top .25s ease;
  }
  .thread.active { border-color: var(--amber); box-shadow: 0 2px 10px rgba(217,119,6,.15); }
  .thread.resolved { opacity: .55; }
  .thread-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px 4px; cursor: pointer; }
  .thread-label { font-size: 12px; font-weight: 700; color: var(--amber); }
  .thread.resolved .thread-label { color: var(--muted); }
  .thread-head .spacer { flex: 1; }
  .resolve-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; cursor: pointer; }
  .resolve-btn:hover { border-color: var(--amber); color: var(--amber); }
  .anchor-quote { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--muted); padding: 0 12px 6px; border-bottom: 1px solid #f3f4f6; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .comments { padding: 6px 12px; display: flex; flex-direction: column; gap: 8px; }
  .comment { border-radius: 8px; padding: 7px 10px; font-size: 13px; line-height: 1.5; }
  .comment .meta { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .comment .meta b { color: var(--ink); font-size: 12px; }
  .comment.agent { background: #fffbeb; border-left: 3px solid var(--amber); }
  .comment.human { background: var(--lily-bg); border-left: 3px solid var(--lily); }
  .reply { display: flex; gap: 6px; padding: 8px 12px 12px; }
  .reply textarea {
    flex: 1; resize: vertical; min-height: 34px; max-height: 160px; font: inherit; font-size: 13px;
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; outline: none;
  }
  .reply textarea:focus { border-color: var(--lily); }
  .reply button { align-self: flex-end; background: var(--lily); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; }
  .reply button:disabled { opacity: .4; cursor: default; }
  #connector-svg { position: fixed; inset: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; }
  #sel-btn {
    position: absolute; z-index: 30; display: none; background: var(--ink); color: #fff; border: none;
    border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #composer {
    position: absolute; z-index: 31; display: none; width: 300px; background: #fff; border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.15); padding: 10px;
  }
  #composer textarea { width: 100%; min-height: 60px; font: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; }
  #composer .row { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }
  #composer button { border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; border: 1px solid var(--line); background: #fff; }
  #composer button.primary { background: var(--lily); border-color: var(--lily); color: #fff; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; font-size: 13px; padding: 8px 14px; border-radius: 8px; z-index: 50; opacity: 0; transition: opacity .3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1 id="doc-title">grill-plan</h1>
  <div id="grill-nav"></div>
  <span class="badge" id="thread-count"></span>
  <button class="hdr-btn" id="edit-btn">Edit</button>
  <button class="hdr-btn primary" id="save-btn" style="display:none">Save</button>
  <button class="hdr-btn" id="cancel-btn" style="display:none">Cancel</button>
  <span class="dot" id="live-dot" title="live connection"></span>
</header>
<div id="layout">
  <nav id="toc"></nav>
  <div id="doc-wrap"><article id="doc">Loading…</article></div>
  <aside id="panel">
    <div id="threads"></div>
  </aside>
</div>
<svg id="connector-svg"></svg>
<button id="sel-btn">💬 Comment</button>
<div id="composer">
  <textarea id="composer-text" placeholder="Start a thread…"></textarea>
  <div class="row">
    <button id="composer-cancel">Cancel</button>
    <button id="composer-save" class="primary">Comment</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const PARAMS = new URLSearchParams(location.search);
const ME = PARAMS.get('author') || 'You';
const AGENT_AUTHORS = new RegExp(PARAMS.get('agent') || 'agent|claude|assistant|bot', 'i');
let threadsData = { threads: [] };
let activeThread = null;
let pendingSelection = null;

const $ = s => document.querySelector(s);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const toast = msg => { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); };
const fmtTime = ts => { try { const d = new Date(ts); return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}); } catch { return ''; } };

async function api(path, body) {
  const res = await fetch(path, body ? {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)} : undefined);
  if (!res.ok) throw new Error((await res.json()).error || res.status);
  return res.json();
}

// ---------- doc rendering ----------
async function loadDoc() {
  const {markdown, title} = await api('/api/doc');
  document.title = title + ' · grill-plan';
  $('#doc-title').textContent = title;
  let html;
  if (window.marked && window.DOMPurify) {
    html = DOMPurify.sanitize(marked.parse(markdown), {ADD_ATTR: ['target']});
  } else {
    html = '<pre style="white-space:pre-wrap">' + esc(markdown) + '</pre>';
  }
  $('#doc').innerHTML = html;
  // mermaid blocks: replace <pre><code class="language-mermaid"> with rendered diagrams
  document.querySelectorAll('#doc pre code.language-mermaid').forEach(code => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code.textContent;
    code.closest('pre').replaceWith(div);
  });
  if (window.mermaid) {
    mermaid.initialize({startOnLoad: false, theme: 'neutral'});
    try { await mermaid.run({nodes: document.querySelectorAll('#doc .mermaid')}); } catch (e) { console.warn('mermaid:', e); }
  }
  buildToc();
}

function buildToc() {
  const toc = $('#toc');
  toc.innerHTML = '';
  document.querySelectorAll('#doc h1, #doc h2, #doc h3, #doc h4').forEach((h, i) => {
    if (!h.id) h.id = 'sec-' + i;
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'toc-' + h.tagName.toLowerCase();
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({block: 'start', behavior: 'smooth'});
      toc.querySelectorAll('a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
    });
    toc.appendChild(a);
  });
}

// ---------- anchor finding & marking ----------
function clearMarks() {
  document.querySelectorAll('mark.grill-mark').forEach(m => {
    const parent = m.parentNode;
    while (m.firstChild) parent.insertBefore(m.firstChild, m);
    parent.removeChild(m);
    parent.normalize();
  });
}

function textIndex(container) {
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  const nodes = []; let text = '';
  let n;
  while ((n = walker.nextNode())) {
    if (n.parentElement && n.parentElement.closest('script,style')) continue;
    nodes.push({node: n, start: text.length});
    text += n.nodeValue;
  }
  return {text, nodes};
}

function normSearch(hay, needle) {
  // exact first
  let i = hay.indexOf(needle);
  if (i !== -1) return [i, i + needle.length];
  // whitespace-insensitive: build map from normalized hay -> raw indices
  const map = []; let normHay = '';
  let lastSpace = true;
  for (let j = 0; j < hay.length; j++) {
    const c = /\s/.test(hay[j]) ? ' ' : hay[j];
    if (c === ' ' && lastSpace) continue;
    normHay += c; map.push(j); lastSpace = (c === ' ');
  }
  const normNeedle = needle.replace(/\s+/g, ' ').trim();
  const k = normHay.indexOf(normNeedle);
  if (k === -1) return null;
  return [map[k], map[k + normNeedle.length - 1] + 1];
}

function markAnchor(thread) {
  const {text, nodes} = textIndex($('#doc'));
  const span = normSearch(text, thread.anchor);
  if (!span) return false;
  const [start, end] = span;
  // collect affected text nodes
  const segs = [];
  for (const {node, start: ns} of nodes) {
    const ne = ns + node.nodeValue.length;
    if (ne <= start || ns >= end) continue;
    segs.push({node, from: Math.max(0, start - ns), to: Math.min(node.nodeValue.length, end - ns)});
  }
  for (const {node, from, to} of segs) {
    let target = node;
    if (from > 0) target = target.splitText(from);
    if (to - from < target.nodeValue.length) target.splitText(to - from);
    const mark = document.createElement('mark');
    mark.className = 'grill-mark' + (thread.status === 'resolved' ? ' resolved' : '');
    mark.dataset.tid = thread.id;
    target.parentNode.insertBefore(mark, target);
    mark.appendChild(target);
  }
  return segs.length > 0;
}

// ---------- panel rendering ----------
function saveDrafts() {
  const drafts = {};
  document.querySelectorAll('.reply textarea').forEach(t => { if (t.value) drafts[t.dataset.tid] = t.value; });
  return drafts;
}

const isAnswered = t => t.comments.some(c => !AGENT_AUTHORS.test(c.author));

function renderChips() {
  const nav = $('#grill-nav');
  nav.innerHTML = '';
  const threads = threadsData.threads || [];
  threads.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (t.status === 'resolved' ? ' resolved' : isAnswered(t) ? ' answered' : '');
    chip.textContent = (t.label || '').match(/\d+$/) ? t.label.match(/\d+$/)[0] : (i + 1);
    chip.title = t.label + ' — ' + (t.status === 'resolved' ? 'resolved' : isAnswered(t) ? 'answered' : 'awaiting your answer');
    chip.addEventListener('click', () => focusThread(t.id, true));
    nav.appendChild(chip);
  });
  const answered = threads.filter(isAnswered).length;
  const resolved = threads.filter(t => t.status === 'resolved').length;
  $('#thread-count').textContent = `${answered}/${threads.length} answered · ${resolved} resolved`;
}

function renderPanel() {
  const drafts = saveDrafts();
  const wrap = $('#threads');
  wrap.innerHTML = '';
  const threads = threadsData.threads || [];
  renderChips();
  for (const t of threads) {
    const el = document.createElement('div');
    el.className = 'thread' + (t.status === 'resolved' ? ' resolved' : '') + (activeThread === t.id ? ' active' : '');
    el.dataset.tid = t.id;
    el.innerHTML = `
      <div class="thread-head">
        <span class="thread-label">${esc(t.label || t.id)}</span>
        <span class="spacer"></span>
        <button class="resolve-btn">${t.status === 'resolved' ? 'Reopen' : 'Resolve'}</button>
      </div>
      <div class="anchor-quote">“${esc(t.anchor)}”</div>
      <div class="comments">${t.comments.map(c => `
        <div class="comment ${AGENT_AUTHORS.test(c.author) ? 'agent' : 'human'}">
          <div class="meta"><b>${esc(c.author)}</b> · ${fmtTime(c.ts)}</div>
          <div>${esc(c.text).replace(/\n/g, '<br>')}</div>
        </div>`).join('')}
      </div>
      <div class="reply">
        <textarea placeholder="Reply as ${esc(ME)}…" data-tid="${t.id}">${esc(drafts[t.id] || '')}</textarea>
        <button>Reply</button>
      </div>`;
    el.querySelector('.thread-head').addEventListener('click', () => focusThread(t.id, true));
    el.querySelector('.resolve-btn').addEventListener('click', async e => {
      e.stopPropagation();
      await api('/api/resolve', {thread_id: t.id, status: t.status === 'resolved' ? 'open' : 'resolved'});
    });
    const ta = el.querySelector('textarea');
    const btn = el.querySelector('.reply button');
    const send = async () => {
      const v = ta.value.trim();
      if (!v) return;
      btn.disabled = true;
      try { await api('/api/comment', {thread_id: t.id, author: ME, text: v}); ta.value = ''; }
      catch (err) { toast('Failed: ' + err.message); }
      btn.disabled = false;
    };
    btn.addEventListener('click', send);
    ta.addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') send(); });
    wrap.appendChild(el);
  }
}

function focusThread(tid, scrollDoc) {
  activeThread = tid;
  document.querySelectorAll('.thread').forEach(el => el.classList.toggle('active', el.dataset.tid === tid));
  document.querySelectorAll('mark.grill-mark').forEach(m => m.classList.toggle('active', m.dataset.tid === tid));
  const mark = document.querySelector(`mark.grill-mark[data-tid="${tid}"]`);
  if (scrollDoc && mark) mark.scrollIntoView({block: 'center', behavior: 'smooth'});
  scheduleConnectors();
}

// ---------- margin layout: park each card next to its anchor ----------
function layoutCards() {
  const panel = $('#panel');
  const pTop = panel.getBoundingClientRect().top;
  const items = [...document.querySelectorAll('.thread')].map(card => {
    const mark = document.querySelector(`mark.grill-mark[data-tid="${card.dataset.tid}"]`);
    return {card, desired: mark ? mark.getBoundingClientRect().top - pTop : Infinity};
  });
  items.sort((a, b) => a.desired - b.desired);
  let cursor = 10;
  for (const it of items) {
    const top = Math.max(it.desired === Infinity ? cursor : it.desired, cursor);
    it.card.style.top = top + 'px';
    cursor = top + it.card.offsetHeight + 12;
  }
  panel.style.height = Math.max(cursor + 100, $('#doc-wrap').offsetHeight) + 'px';
  scheduleConnectors();
}
let layoutTimer = null;
const scheduleLayout = () => { clearTimeout(layoutTimer); layoutTimer = setTimeout(layoutCards, 60); };
addEventListener('resize', scheduleLayout);

// ---------- connectors ----------
const svg = $('#connector-svg');
function drawConnectors() {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  for (const t of (threadsData.threads || [])) {
    if (t.status === 'resolved') continue;
    const mark = document.querySelector(`mark.grill-mark[data-tid="${t.id}"]`);
    const card = document.querySelector(`.thread[data-tid="${t.id}"]`);
    if (!mark || !card) continue;
    const mr = mark.getBoundingClientRect(), cr = card.getBoundingClientRect();
    if (!mr.width || !cr.width) continue;
    if (mr.bottom < 45 || mr.top > innerHeight || cr.bottom < 45 || cr.top > innerHeight) continue;
    const x1 = mr.right + 3, y1 = mr.top + mr.height / 2;
    const x2 = cr.left - 3, y2 = cr.top + 16;
    const midX = x1 + (x2 - x1) * 0.55;
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
    p.setAttribute('stroke', '#d97706'); p.setAttribute('stroke-width', activeThread === t.id ? '2' : '1.3');
    p.setAttribute('stroke-dasharray', '5,4'); p.setAttribute('fill', 'none');
    p.setAttribute('opacity', activeThread === t.id ? '1' : '0.55');
    svg.appendChild(p);
    for (const [x, y] of [[x1, y1], [x2, y2]]) {
      const d = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      d.setAttribute('cx', x); d.setAttribute('cy', y); d.setAttribute('r', '2.6'); d.setAttribute('fill', '#d97706');
      svg.appendChild(d);
    }
  }
}
let rafId = null;
function scheduleConnectors() { if (!rafId) rafId = requestAnimationFrame(() => { rafId = null; drawConnectors(); }); }
addEventListener('scroll', scheduleConnectors, true);
addEventListener('resize', scheduleConnectors);

// ---------- selection -> new thread ----------
const selBtn = $('#sel-btn'), composer = $('#composer');
document.addEventListener('mouseup', e => {
  if (composer.contains(e.target) || selBtn.contains(e.target)) return;
  setTimeout(() => {
    const sel = getSelection();
    const txt = sel ? sel.toString().trim() : '';
    if (txt.length > 3 && txt.length < 500 && $('#doc').contains(sel.anchorNode)) {
      const r = sel.getRangeAt(0).getBoundingClientRect();
      pendingSelection = txt;
      selBtn.style.display = 'block';
      selBtn.style.left = (r.right + scrollX - 40) + 'px';
      selBtn.style.top = (r.bottom + scrollY + 6) + 'px';
    } else {
      selBtn.style.display = 'none';
    }
  }, 10);
});
selBtn.addEventListener('click', () => {
  composer.style.display = 'block';
  composer.style.left = selBtn.style.left;
  composer.style.top = selBtn.style.top;
  selBtn.style.display = 'none';
  $('#composer-text').focus();
});
$('#composer-cancel').addEventListener('click', () => { composer.style.display = 'none'; $('#composer-text').value = ''; });
$('#composer-save').addEventListener('click', async () => {
  const text = $('#composer-text').value.trim();
  if (!text || !pendingSelection) return;
  try {
    await api('/api/threads', {anchor: pendingSelection, author: ME, text});
    composer.style.display = 'none'; $('#composer-text').value = '';
    toast('Thread created');
  } catch (err) { toast('Failed: ' + err.message); }
});

// ---------- live updates ----------
async function refreshThreads() {
  threadsData = await api('/api/threads');
  clearMarks();
  let missing = 0;
  for (const t of threadsData.threads || []) if (!markAnchor(t)) missing++;
  renderPanel();
  document.querySelectorAll('mark.grill-mark').forEach(m => {
    m.addEventListener('click', () => {
      focusThread(m.dataset.tid, false);
      const card = document.querySelector(`.thread[data-tid="${m.dataset.tid}"]`);
      if (card) card.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
  });
  if (missing) toast(missing + ' anchor(s) not found in doc');
  layoutCards();
  document.querySelectorAll('#doc img').forEach(img => {
    if (!img.complete) img.addEventListener('load', scheduleLayout, {once: true});
  });
}

function connectSSE() {
  const es = new EventSource('/api/events');
  es.onopen = () => $('#live-dot').classList.add('live');
  es.onmessage = async e => {
    if (editing) return; // don't clobber an open editor; full reload happens on exit
    if (e.data === 'doc') { await loadDoc(); }
    refreshThreads();
  };
  es.onerror = () => { $('#live-dot').classList.remove('live'); es.close(); setTimeout(connectSSE, 2000); };
}

// ---------- edit mode ----------
let editing = false;
const editBtn = $('#edit-btn'), saveBtn = $('#save-btn'), cancelBtn = $('#cancel-btn');

async function enterEdit() {
  const {markdown} = await api('/api/doc');
  editing = true;
  clearMarks();
  const ta = document.createElement('textarea');
  ta.id = 'editor';
  ta.value = markdown;
  $('#doc').innerHTML = '';
  $('#doc').appendChild(ta);
  editBtn.style.display = 'none';
  saveBtn.style.display = cancelBtn.style.display = '';
  $('#panel').style.visibility = 'hidden';
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  ta.focus();
}

async function exitEdit(save) {
  if (save) {
    const md = $('#editor').value;
    try { await api('/api/doc', {markdown: md}); toast('Saved'); }
    catch (err) { toast('Save failed: ' + err.message); return; }
  }
  editing = false;
  editBtn.style.display = '';
  saveBtn.style.display = cancelBtn.style.display = 'none';
  $('#panel').style.visibility = '';
  await loadDoc();
  await refreshThreads();
}

editBtn.addEventListener('click', enterEdit);
saveBtn.addEventListener('click', () => exitEdit(true));
cancelBtn.addEventListener('click', () => exitEdit(false));
document.addEventListener('keydown', e => {
  if (editing && (e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); exitEdit(true); }
});

(async function init() {
  await loadDoc();
  await refreshThreads();
  connectSSE();
})();
</script>
</body>
</html>
